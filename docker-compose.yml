services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotpilot-bdc-app
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotpilot-bdc-worker
    command: ["./docker/start-worker.sh"]
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: lotpilot-bdc-postgres
    environment:
      POSTGRES_DB: lotpilot_bdc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lotpilot-bdc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lotpilot_bdc"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lotpilot-bdc-redis
    ports:
      - "6379:6379"
    volumes:
      - lotpilot-bdc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  lotpilot-bdc-postgres-data:
  lotpilot-bdc-redis-data:
