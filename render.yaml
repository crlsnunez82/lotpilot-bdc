services:
  - type: web
    name: lotpilot-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run check:env && npm run build
    preDeployCommand: npm run check:env && npm run prisma:deploy
    startCommand: npm run render:start
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - fromGroup: lotpilot-shared
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: lotpilot-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lotpilot-redis
          property: connectionString
      - key: APP_URL
        sync: false
      - key: CAPTURE_API_TOKEN
        sync: false
      - key: EMAIL_INBOUND_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_REPLY_TO_ADDRESS
        sync: false

  - type: worker
    name: lotpilot-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run check:env && npm run prisma:generate
    preDeployCommand: npm run check:env && npm run prisma:deploy
    startCommand: npm run render:worker
    autoDeploy: true
    envVars:
      - fromGroup: lotpilot-shared
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lotpilot-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lotpilot-redis
          property: connectionString
      - key: APP_URL
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: APP_URL
      - key: WORKFLOW_WORKER_CONCURRENCY
        value: "5"
      - key: CAPTURE_API_TOKEN
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: CAPTURE_API_TOKEN
      - key: EMAIL_INBOUND_TOKEN
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: EMAIL_INBOUND_TOKEN
      - key: TWILIO_ACCOUNT_SID
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: TWILIO_AUTH_TOKEN
      - key: TWILIO_PHONE_NUMBER
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: TWILIO_PHONE_NUMBER
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: OPENAI_API_KEY
      - key: SMTP_HOST
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: SMTP_HOST
      - key: SMTP_USER
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: SMTP_USER
      - key: SMTP_PASS
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: SMTP_PASS
      - key: EMAIL_FROM_ADDRESS
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: EMAIL_FROM_ADDRESS
      - key: EMAIL_REPLY_TO_ADDRESS
        fromService:
          type: web
          name: lotpilot-web
          envVarKey: EMAIL_REPLY_TO_ADDRESS

envVarGroups:
  - name: lotpilot-shared
    envVars:
      - key: AUTH_SESSION_SECRET
        generateValue: true
      - key: TWILIO_DEV_MODE
        value: "true"
      - key: EMAIL_DEV_MODE
        value: "true"
      - key: SMTP_SECURE
        value: "false"
      - key: WORKFLOW_QUEUE_ENABLED
        value: "true"
      - key: WORKFLOW_SAFE_MODE
        value: "true"
      - key: AI_PROVIDER
        value: heuristic
      - key: AUTH_SESSION_TTL_SECONDS
        value: "43200"
      - key: AUTH_LOGIN_WINDOW_MINUTES
        value: "15"
      - key: AUTH_LOGIN_MAX_FAILURES
        value: "5"
      - key: AUTH_LOGIN_BLOCK_MINUTES
        value: "30"
      - key: PUBLIC_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: CAPTURE_API_MAX_REQUESTS
        value: "120"
      - key: EMAIL_INBOUND_MAX_REQUESTS
        value: "120"
      - key: AGENT_DEFAULT_TIMEZONE
        value: America/New_York
      - key: AUTO_RESPONSE_DEFAULT_MODE
        value: SUGGEST_ONLY
      - key: SEED_ADMIN_EMAIL
        value: admin@lotpilot.local
      - key: SEED_ADMIN_PASSWORD
        value: change-me-now

databases:
  - name: lotpilot-postgres
    databaseName: lotpilot
    plan: basic-1gb

  - name: lotpilot-redis
    plan: starter
